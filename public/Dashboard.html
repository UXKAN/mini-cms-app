<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --bg: oklch(0.968 0.007 75);
    --surface: oklch(0.995 0.003 75);
    --border: oklch(0.89 0.009 75);

    --radius-sm: 7px;

  body { font-family: var(--font-sans); background: var(--bg); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  ::placeholder { color: var(--ink-subtle); }
  * { -webkit-tap-highlight-color: transparent; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes modalIn { from { opacity:0; transform: translateY(-8px) scale(0.98); } to { opacity:1; transform: translateY(0) scale(1); } }
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  #tweaks-panel {
    display: none; position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow-lg);

<div id="root"></div>

<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <label><span>Accentkleur</span><input type="color" value="#1a8c6e" oninput="applyTweak('accent',this.value)"></label>
  <label><span>Zijbalk stijl</span>
    <select onchange="applyTweak('sidebar',this.value)">
      <option value="light">Licht</option>
      <option value="dark">Donker</option>
    </select>
  </label>
  <label><span>Compact modus</span>
    <select onchange="applyTweak('density',this.value)">
      <option value="normal">Normaal</option>
      <option value="compact">Compact</option>
    </select>
  </label>
</div>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accent":"#1a8c6e","sidebar":"light","density":"normal"}/*EDITMODE-END*/;
  function applyTweak(k,v){
    if(k==='accent'){ document.documentElement.style.setProperty('--accent',v); document.documentElement.style.setProperty('--border-focus',v); }
    if(k==='sidebar'){ document.documentElement.style.setProperty('--sb-bg', v==='dark'?'oklch(0.14 0.02 220)':'var(--surface)'); document.documentElement.style.setProperty('--sb-color', v==='dark'?'oklch(0.85 0.01 220)':'var(--ink)'); document.documentElement.style.setProperty('--sb-border', v==='dark'?'oklch(0.22 0.02 220)':'var(--border)'); }
    if(k==='density'){ document.documentElement.style.setProperty('--content-pad', v==='compact'?'20px':'32px'); }
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}},'*');
  }
  window.addEventListener('message',e=>{
    if(e.data?.type==='__activate_edit_mode') document.getElementById('tweaks-panel').style.display='block';
    if(e.data?.type==='__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display='none';
  });
  window.parent.postMessage({type:'__edit_mode_available'},'*');
</script>

function FocusInput({ hasError, extraPadRight=0, ...props }) {
  const [foc, setFoc] = useState(false);
  return (
    <input {...props}
      onFocus={e => { setFoc(true); props.onFocus?.(e); }}
      onBlur={e => { setFoc(false); props.onBlur?.(e); }}
      style={{ width:'100%', padding:`11px ${14+extraPadRight}px 11px 14px`, fontFamily:'var(--font-sans)', fontSize:15, border:`1.5px solid ${hasError ? T.error : foc ? T.accent : T.border}`, borderRadius:T.radiusSm, background:T.bg, color:T.ink, outline:'none', transition:'border-color 0.15s', boxShadow:foc?'0 0 0 3px oklch(0.52 0.13 165 / 0.1)':'none' }}
    />
  );
}

function AccentButton({ loading, children, onClick, type='button', style={} }) {
  const [hov, setHov] = useState(false);
  return (
    <button type={type} onClick={onClick} disabled={loading}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}

function TotalDonationsWidget({ onNavigate }) {
  const now = new Date();
  const [viewMonth, setViewMonth] = useState(now.getMonth()); // 0-indexed
  const [viewYear, setViewYear] = useState(now.getFullYear());

  const curTotal = DB.totalForMonth(viewYear, viewMonth + 1);
  // Previous month
  const prevM = viewMonth === 0 ? 11 : viewMonth - 1;
  const prevY = viewMonth === 0 ? viewYear - 1 : viewYear;
  const prevTotal = DB.totalForMonth(prevY, prevM + 1);
  const growth = prevTotal > 0 ? ((curTotal - prevTotal) / prevTotal) * 100 : 0;

  // Sparkline: last 12 months
  const sparkData = [];
  for (let i = 11; i >= 0; i--) {
    let m = viewMonth - i; let y = viewYear;
    while (m < 0) { m += 12; y--; }
    sparkData.push(DB.totalForMonth(y, m + 1));
  }

  const prev = () => { if (viewMonth === 0) { setViewMonth(11); setViewYear(y => y - 1); } else setViewMonth(m => m - 1); };
  const next = () => {
    const nextM = viewMonth === 11 ? 0 : viewMonth + 1;
    const nextY = viewMonth === 11 ? viewYear + 1 : viewYear;
    if (nextY > now.getFullYear() || (nextY === now.getFullYear() && nextM > now.getMonth())) return;
    if (viewMonth === 11) { setViewMonth(0); setViewYear(y => y + 1); } else setViewMonth(m => m + 1);
  };

  const ytdTotal = (() => {
    let s = 0;
    for (let m = 1; m <= now.getMonth() + 1; m++) s += DB.totalForMonth(now.getFullYear(), m);
    return s;
  })();

  return (
    <Card style={{ padding:'22px 24px', gridColumn:'1 / span 2' }} hover onClick={() => onNavigate('donaties')}>
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:16, flexWrap:'wrap', gap:10 }}>
        <div>
          <div style={{ fontSize:11, fontWeight:700, color:T.inkSubtle, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>Totale donaties</div>
          <div style={{ display:'flex', alignItems:'center', gap:12, flexWrap:'wrap' }}>
            <StatNum value={curTotal} prefix={'€\u202F'} size={36}/>
            <Delta value={growth}/>
          </div>
          <div style={{ fontSize:12, color:T.inkMuted, marginTop:4 }}>vs. vorige maand ({eur(prevTotal)})</div>
        </div>
        <div style={{ textAlign:'right' }}>

function validateIBAN(iban) {
  const c = iban.replace(/\s/g,'').toUpperCase();
  if(!/^[A-Z]{2}\d{2}[A-Z0-9]{1,30}$/.test(c)) return false;
  const r = c.slice(4)+c.slice(0,4);
  const n = r.split('').map(x=>isNaN(x)?(x.charCodeAt(0)-55).toString():x).join('');
  let rem=0; for(let i=0;i<n.length;i+=7) rem=parseInt(String(rem)+n.slice(i,i+7))%97;
  return rem===1;
}
function formatIBAN(v){ return v.replace(/\s/g,'').toUpperCase().replace(/(.{4})/g,'$1 ').trim(); }

function DonationFormModal({ open, onClose, onSubmitted }) {
  const [form, setForm] = useState({ naam:'', geboortedatum:'', adres:'', postcode_plaats:'', land:'Nederland', telefoon:'', email:'', gift_type:'periodiek', bedrag_maand:'', bedrag_eenmalig:'', startdatum:'', akkoord:false, iban:'', naam_rekening:'', plaats:'', datum:new Date().toISOString().split('T')[0], volledige_naam:'', handtekening:null });
  const [errors, setErrors] = useState({});
  const [touched, setTouched] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [done, setDone] = useState(false);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const touch = (k) => setTouched(t=>({...t,[k]:true}));

  const validate = (data=form) => {
    const e={};
    if(!data.naam.trim()) e.naam='Verplicht';
    if(!data.email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) e.email='Ongeldig e-mailadres';
    if(!data.adres.trim()) e.adres='Verplicht';
    if(!data.postcode_plaats.trim()) e.postcode_plaats='Verplicht';
    if(data.gift_type==='periodiek'){ if(!data.bedrag_maand||Number(data.bedrag_maand)<=0) e.bedrag_maand='Verplicht'; } else { if(!data.bedrag_eenmalig||Number(data.bedrag_eenmalig)<=0) e.bedrag_eenmalig='Verplicht'; }
    if(!data.akkoord) e.akkoord='Verplicht';
    if(!validateIBAN(data.iban.replace(/\s/g,''))) e.iban='Ongeldig IBAN';
    if(!data.naam_rekening.trim()) e.naam_rekening='Verplicht';
    if(!data.handtekening) e.handtekening='Handtekening verplicht';
    if(!data.volledige_naam.trim()) e.volledige_naam='Verplicht';
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const submit = async (e) => {
    e.preventDefault();
    setTouched(Object.fromEntries(Object.keys(form).map(k=>[k,true])));
    if(!validate()) return;
    setSubmitting(true);
    await new Promise(r=>setTimeout(r,900));
    // Add to DB
    const amount = form.gift_type==='periodiek' ? Number(form.bedrag_maand) : Number(form.bedrag_eenmalig);
    DB.addDonation({ donorId:null, amount, date:form.datum, type:'cash', method:'cash' });
    setSubmitting(false);
    setDone(true);
    setTimeout(() => { setDone(false); setForm({naam:'',geboortedatum:'',adres:'',postcode_plaats:'',land:'Nederland',telefoon:'',email:'',gift_type:'periodiek',bedrag_maand:'',bedrag_eenmalig:'',startdatum:'',akkoord:false,iban:'',naam_rekening:'',plaats:'',datum:new Date().toISOString().split('T')[0],volledige_naam:'',handtekening:null}); setTouched({}); setErrors({}); onSubmitted(); onClose(); }, 2000);
  };

  // Signature pad
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const [hasSig, setHasSig] = useState(false);
  useEffect(() => { if(canvasRef.current){canvasRef.current.width=560;canvasRef.current.height=150;} }, [open]);

  const getPos = (e, c) => { const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height; return e.touches ? {x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy} : {x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy}; };
  const startDraw = useCallback(e=>{e.preventDefault();const c=canvasRef.current,ctx=c.getContext('2d'),{x,y}=getPos(e,c);drawing.current=true;ctx.beginPath();ctx.moveTo(x,y);},[]);
  const draw = useCallback(e=>{if(!drawing.current)return;e.preventDefault();const c=canvasRef.current,ctx=c.getContext('2d'),{x,y}=getPos(e,c);ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='oklch(0.18 0.02 65)';ctx.lineTo(x,y);ctx.stroke();},[]);
  const endDraw = useCallback(()=>{if(!drawing.current)return;drawing.current=false;const du=canvasRef.current.toDataURL();setHasSig(true);set('handtekening',du);},[]);
  const clearSig = ()=>{const c=canvasRef.current;c.getContext('2d').clearRect(0,0,c.width,c.height);setHasSig(false);set('handtekening',null);};

  const FI = ({field, label, req, type='text', placeholder}) => (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:'block', fontSize:12, fontWeight:600, color:T.inkMuted, marginBottom:5 }}>{label}{req&&<span style={{color:T.accent}}> *</span>}</label>
      <input type={type} value={form[field]} onChange={e=>set(field,e.target.value)} onBlur={()=>touch(field)} placeholder={placeholder}
        style={{ width:'100%', padding:'9px 12px', border:`1.5px solid ${touched[field]&&errors[field]?T.error:T.border}`, borderRadius:T.radiusSm, fontFamily:'var(--font-sans)', fontSize:14, background:T.bg, color:T.ink, outline:'none', transition:'border-color 0.15s' }}
        onFocus={e=>e.target.style.borderColor=T.accent} onBlur={e=>{touch(field);e.target.style.borderColor=touched[field]&&errors[field]?T.error:T.border;}}/>
      {touched[field]&&errors[field]&&<p style={{fontSize:11,color:T.error,marginTop:3}}>{errors[field]}</p>}
    </div>
  );

  if (done) return (
    <Modal open={open} onClose={onClose} title="Donatie ingediend" width={400}>
      <div style={{ padding:32, textAlign:'center' }}>
        <div style={{ width:52,height:52,borderRadius:'50%',background:T.accentLight,margin:'0 auto 16px',display:'flex',alignItems:'center',justifyContent:'center' }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={T.accent} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2 style={{ fontFamily:'var(--font-serif)', fontSize:22, fontWeight:400, marginBottom:8 }}>Bedankt!</h2>
        <p style={{ fontSize:14, color:T.inkMuted }}>De donatie is verwerkt en het dashboard wordt bijgewerkt.</p>
      </div>
    </Modal>
  );

  return (
    <Modal open={open} onClose={onClose} title="Nieuwe donatie toevoegen" width={640}>
      <form onSubmit={submit} noValidate style={{ padding:'24px 28px', maxHeight:'75vh', overflowY:'auto' }}>
        <h3 style={{ fontFamily:'var(--font-serif)',fontSize:16,fontWeight:400,color:T.inkMuted,marginBottom:16,paddingBottom:10,borderBottom:`1px solid ${T.border}` }}>1 · Gegevens schenker</h3>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 16px' }}>
          <div style={{gridColumn:'1/-1'}}><FI field="naam" label="Volledige naam" req placeholder="Jan de Vries"/></div>
          <FI field="geboortedatum" label="Geboortedatum" type="date"/>
          <FI field="telefoon" label="Telefoon" placeholder="+31 6 …"/>
          <div style={{gridColumn:'1/-1'}}><FI field="adres" label="Adres" req placeholder="Straatnaam 12"/></div>
          <FI field="postcode_plaats" label="Postcode & Woonplaats" req placeholder="7511 AB Enschede"/>
          <div style={{ marginBottom:14 }}>
            <label style={{ display:'block', fontSize:12, fontWeight:600, color:T.inkMuted, marginBottom:5 }}>Land</label>
            <select value={form.land} onChange={e=>set('land',e.target.value)} style={{ width:'100%', padding:'9px 12px', border:`1.5px solid ${T.border}`, borderRadius:T.radiusSm, fontFamily:'var(--font-sans)', fontSize:14, background:T.bg, color:T.ink, outline:'none', cursor:'pointer' }}>
              {['Nederland','België','Duitsland','Turkije','Marokko','Anders'].map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
          <div style={{gridColumn:'1/-1'}}><FI field="email" label="E-mailadres" req type="email" placeholder="jan@example.nl"/></div>

        <h3 style={{ fontFamily:'var(--font-serif)',fontSize:16,fontWeight:400,color:T.inkMuted,marginBottom:16,paddingBottom:10,borderBottom:`1px solid ${T.border}`,marginTop:8 }}>2 · Type gift</h3>
        <div style={{ display:'flex', gap:10, marginBottom:14 }}>
          {['periodiek','eenmalig'].map(t => (
            <label key={t} style={{ flex:1, display:'flex', alignItems:'center', gap:10, padding:'11px 14px', border:`1.5px solid ${form.gift_type===t?T.accent:T.border}`, borderRadius:T.radiusSm, background:form.gift_type===t?T.accentLight:T.surface, cursor:'pointer', transition:'all 0.15s' }}>

          <div style={{marginBottom:14}}>
            <label style={{display:'block',fontSize:12,fontWeight:600,color:T.inkMuted,marginBottom:5}}>Datum</label>
            <input type="date" value={form.datum} onChange={e=>set('datum',e.target.value)} style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${T.border}`,borderRadius:T.radiusSm,fontFamily:'var(--font-sans)',fontSize:14,background:T.bg,color:T.ink,outline:'none'}}/>
          </div>
          <div style={{gridColumn:'1/-1'}}><FI field="volledige_naam" label="Volledige naam" req placeholder="Jan de Vries"/></div>
        </div>

        <div style={{ marginBottom:20 }}>
          <label style={{ display:'block', fontSize:12, fontWeight:600, color:T.inkMuted, marginBottom:5 }}>Handtekening <span style={{color:T.accent}}>*</span></label>
          <div style={{ border:`1.5px solid ${touched.handtekening&&errors.handtekening?T.error:T.border}`, borderRadius:T.radiusSm, background:'#fefefe', position:'relative', overflow:'hidden' }}>
            {!hasSig&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:T.inkSubtle,fontSize:13,fontStyle:'italic',pointerEvents:'none'}}>Teken hier uw handtekening</div>}
            <canvas ref={canvasRef} style={{width:'100%',height:150,display:'block',cursor:'crosshair',touchAction:'none'}}
              onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
              onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
            {hasSig?<span style={{fontSize:12,color:T.accentDark,fontWeight:500}}>✓ Handtekening vastgelegd</span>:<span/>}
            <button type="button" onClick={clearSig} style={{fontSize:12,color:T.inkMuted,background:'none',border:`1px solid ${T.border}`,borderRadius:T.radiusSm,padding:'3px 10px',cursor:'pointer',fontFamily:'var(--font-sans)'}}>Wissen</button>
          </div>
          {touched.handtekening&&errors.handtekening&&<p style={{fontSize:11,color:T.error,marginTop:4}}>{errors.handtekening}</p>}
        </div>

        <AccentButton loading={submitting} type="submit" style={{borderRadius:T.radiusSm}}>
          {submitting?'Verwerken…':'Donatie indienen →'}
        </AccentButton>
      </form>
    </Modal>
  );
}

// ── Dashboard Layout ──────────────────────────────────────────────────────────
function DashboardLayout({ user, onLogout }) {
  const saved = sessionStorage.getItem('nm_view') || 'dashboard';
  const [view, setView] = useState(saved);
  const [formOpen, setFormOpen] = useState(false);
  const [tick, setTick] = useState(0); // force re-render after donation added

  const navigate = (v) => { setView(v); sessionStorage.setItem('nm_view', v); };

  const pageMap = {
    dashboard: <DashboardHome key={tick} onNavigate={navigate}/>,
    leden: <LedenPage/>,
    ondernemers: <OndernemersPage/>,
    donaties: <DonatiePage key={tick}/>,
    toezeggingen: <ToezeggingPage/>,
    evenementen: <EvenementenPage/>,
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar active={view} onNav={navigate} onNewDonatie={()=>setFormOpen(true)} user={user} onLogout={onLogout}/>
      <main style={{ flex:1, padding:'var(--content-pad, 32px)', overflowY:'auto', minWidth:0 }}>
        {pageMap[view] || pageMap.dashboard}
      </main>
      <DonationFormModal open={formOpen} onClose={()=>setFormOpen(false)} onSubmitted={()=>setTick(t=>t+1)}/>
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem('nm_auth')); } catch { return null; }
  });
  const logout = () => { sessionStorage.removeItem('nm_auth'); sessionStorage.removeItem('nm_view'); setUser(null); };
  if (!user) return <LoginScreen onLogin={setUser}/>;
  return <DashboardLayout user={user} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
